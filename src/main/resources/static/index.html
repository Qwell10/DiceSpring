<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice</title>
    <style>
        body {
            background-color: #2e7d32;
            background-image: radial-gradient(circle, #388e3c, #1b5e20);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
        }

        .dice-container {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            min-height: 80px;
        }

        .die {
            width: 70px;
            height: 70px;
            background-color: white;
            color: #222;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            box-shadow: 3px 5px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s;
            cursor: pointer;
        }

        .die.selected {
            background-color: #ffeb3b;
            border: 2px solid #f57f17;
            transform: translateY(-10px);
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.3);
        }

        @keyframes rollAnimation {
            0% {
                transform: rotate(0deg) scale(1);
            }

            25% {
                transform: rotate(90deg) scale(1.1);
                background-color: #f0f0f0;
            }

            50% {
                transform: rotate(180deg) scale(1.2);
            }

            75% {
                transform: rotate(270deg) scale(1.1);
                background-color: #f8f8f8;
            }

            100% {
                transform: rotate(360deg) scale(1);
            }
        }

        .rolling {
            animation: rollAnimation 0.6s linear infinite;
        }

        button {
            padding: 15px 35px;
            font-size: 22px;
            background-color: #ffb300;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0 #ff8f00, 0 10px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.1s;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #ff8f00, 0 4px 4px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            background-color: #ffc107;
        }

        button:disabled {
            background-color: #ccc;
            box-shadow: 0 6px 0 #999;
            cursor: not-allowed;
            transform: none;
        }

        #gameMessage {
            margin: 15px auto;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            max-width: 400px;
            display: none;
            transition: opacity 0.3s ease;
        }

        .message-error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #f87171;
            display: block !important;
        }

        .message-success {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #4ade80;
            display: block !important;
        }
    </style>
</head>

<body>
    <div id="gameMessage"></div>

    <div id="diceArea" class="dice-container"></div>

    <div class="button-container">
        <button id="rollBtn">Hodit kostkama</button>
        <button id="scoreBtn" disabled>Vybrat kostky</button>
    </div>

    <script>
        const diceArea = document.getElementById('diceArea');
        const gameMessage = document.getElementById('gameMessage');
        const rollBtn = document.getElementById('rollBtn');
        const scoreBtn = document.getElementById('scoreBtn');

        function showMessage(text, isError) {
            gameMessage.innerText = text;

            if (isError) {
                gameMessage.className = 'message-error';
            } else {
                gameMessage.className = 'message-success';
            }

            setTimeout(() => {
                gameMessage.style.display = 'none';
                gameMessage.className = '';
            }, 3500);
        }

        rollBtn.addEventListener('click', () => {
            rollBtn.disabled = true;
            scoreBtn.disabled = true;

            diceArea.innerHTML = '';

            fetch('/api/dice/roll', { method: 'POST' })
                .then(response => response.json())
                .then(diceValues => {
                    const diceElements = [];

                    for (let i = 0; i < diceValues.length; i++) {
                        const die = document.createElement('div');
                        die.className = 'die rolling';
                        die.innerText = '?';
                        diceArea.appendChild(die);
                        diceElements.push(die);
                    }

                    setTimeout(() => {
                        diceElements.forEach((die, index) => {
                            die.classList.remove('rolling');
                            die.innerText = diceValues[index];

                            die.addEventListener('click', () => {
                                die.classList.toggle('selected');

                                const selectedCount = document.querySelectorAll('.die.selected').length;

                                if (selectedCount > 0) {
                                    scoreBtn.disabled = false;
                                } else {
                                    scoreBtn.disabled = true;
                                }
                            });
                        });
                        rollBtn.disabled = false;
                    }, 600);
                })

                .catch(error => {
                    console.error("Chyba spojení s Javou:", error);
                    rollBtn.disabled = false;
                });
        });

        scoreBtn.addEventListener('click', () => {

            const selectedElements = document.querySelectorAll('.die.selected');
            const selectedDice = [];

            selectedElements.forEach(die => {
                const dieValue = parseInt(die.innerText);
                selectedDice.push(dieValue);
            });

            console.log("Selected dice to send:", selectedDice);

            scoreBtn.disabled = true; //hrac nemuze 2x za sebou rychle kliknout na tlacitko

            fetch('/api/dice/score', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(selectedDice)
            })
                .then(response => {
                    return response.json().then(data => {
                        if (!response.ok) {
                            throw new Error(data.errorMessage);
                        }
                        return data;
                    });
                })
                .then(turnStatus => {
                    console.log("Odpověď z Javy:", turnStatus);

                    // tady bude 200 ok
                    // pozdeji kod na smazani kostek
                })
                .catch(error => {
                    console.error("Chyba: ", error);
                    showMessage(error.message, true); //vyskoci na hrace zprava o chybe

                    scoreBtn.disabled = false; // kdyz se neco pokazi, tlacitko zase odemkneme
                });
        });

    </script>
</body>

</html>
