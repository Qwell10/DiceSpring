<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div id="gameMessage"></div>

    <div id="scoreboard" class="scoreboard">
        <div id="player1-card" class="player-card active">
            <h4 class="player-name">Hráč 1</h4>
            <h3 class="player-score">Celkové Score: <span id="score-p1">0</span></h3>
            <h2 class="player-actual-score">Aktuálně: <span id="actual-score-p1">0</span></h2>
        </div>

        <div id="player2-card" class="player-card">
            <h4 class="player-name">Hráč 2</h4>
            <h3 class="player-score">Celkové Score: <span id="score-p2">0</span></h3>
            <h2 class="player-actual-score">Aktuálně: <span id="actual-score-p2">0</span></h2>
        </div>
    </div>

    <div id="diceArea" class="dice-container"></div>

    <div class="button-container">
        <button id="rollBtn">Hodit kostkama</button>
        <button id="scoreBtn" disabled>Vybrat kostky</button>
        <button id="endTurnBtn" disabled>Zapsat body a ukončit</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/script.js"></script>
</body>

</html>
