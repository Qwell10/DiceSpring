<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div id="gameMessage"></div>

    <div id="scoreboard" class="scoreboard">
        <div id="player1-card" class="player-card active">
            <h3 class="player-name">Hráč 1</h3>
            <div class="player-score">Skóre: <span id="score-p1">0</span></div>
        </div>

        <div id="player2-card" class="player-card">
            <h3 class="player-name">Hráč 2</h3>
            <div class="player-score">Skóre: <span id="score-p2">0</span></div>
        </div>
    </div>

    <div id="diceArea" class="dice-container"></div>

    <div class="button-container">
        <button id="rollBtn">Hodit kostkama</button>
        <button id="scoreBtn" disabled>Vybrat kostky</button>
    </div>

    <script src="/js/script.js"></script>
</body>

</html>
